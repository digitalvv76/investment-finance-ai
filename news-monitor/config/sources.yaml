# Data source definitions

tier_1_rss:  # RSS/Atom feeds — no browser needed
  # NOTE: Yahoo Finance RSS decommissioned (HTTP 403).
  # NOTE: Investing.com blocked by WAF from residential IPs.
  # Verified working feeds as of 2026-07-01:
  - name: "CNBC Top News"
    url: "https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=100003114"
    category: "markets"
  - name: "MarketWatch"
    url: "https://feeds.content.dowjones.io/public/rss/mw_topstories"
    category: "markets"
  - name: "WSJ Markets"
    url: "https://feeds.a.dj.com/rss/RSSMarketsMain.xml"
    category: "markets"
    delay_seconds: 3
  - name: "Seeking Alpha Market Outlook"
    url: "https://seekingalpha.com/feed.xml"
    category: "analysis"
  - name: "CNBC Economy"
    url: "https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=20910258"
    category: "macro"

tier_2_playwright:  # Browser-based scraping
  # Bloomberg blocks headless browsers with anti-bot detection.
  # ZeroHedge works with updated selectors.
  - name: "ZeroHedge"
    url: "https://www.zerohedge.com/"
    selectors:
      headline: "h2, [class*='title'], [class*='Title']"
      link: "a[href^='/']"
    frequency_tier: "heartbeat"  # was "fast" — ZeroHedge breaking news needs 1min polling

tier_3_api_triggers:  # API-based event triggers (no scraping)
  - name: "SEC EDGAR 8-K"
    type: "edgar"
    endpoint: "mcp__stock-scanner__edgar_company_filings"
    form_types: ["8-K"]
    frequency_tier: "heartbeat"

  - name: "FRED Economic Releases"
    type: "fred"
    endpoint: "mcp__stock-scanner__fred_economic_calendar"
    frequency_tier: "normal"

  - name: "Alpha Vantage News"
    type: "alpha_vantage"
    endpoint: "mcp__finance__get_company_overview"  # used as news trigger check
    frequency_tier: "normal"

# -------------------------------------------------------------------
# Twitter/X feeds — Playwright browser + auth cookie
# -------------------------------------------------------------------
# Requires a Twitter/X account login session.  Set auth_token below or
# via TWITTER_AUTH_TOKEN env var.  The token is a cookie from a logged-in
# X session (F12 -> Application -> Cookies -> x.com -> auth_token).
#
# Proxy is auto-detected from HTTPS_PROXY env var; override below if needed.
twitter:
  # auth_token: ""          # Set here OR as TWITTER_AUTH_TOKEN in .env
  # proxy: "http://127.0.0.1:7897"  # override if HTTPS_PROXY not set
  max_items_per_account: 5
  request_delay_seconds: 3.0
  accounts:
    - "@Reuters"            # Reuters Top News — global breaking headlines
    - "@ReutersBusiness"    # Reuters Business — financial news wire
    - "@ReutersWorld"       # Reuters World — geopolitics, conflict, trade
    - "@Newsquawk"         # Real-time breaking news parsing service
    - "@SemiAnalysis"      # SemiAnalysis — semiconductor/AI supply chain deep research
    - "@bespokeinvest"     # Bespoke Investment Group, macro research

# -------------------------------------------------------------------
# Chinese financial news — JSON API endpoints (no RSS required)
# -------------------------------------------------------------------
# 新浪财经 7x24 live feed: lid=2509 (综合), lid=2510 (全球财经)
# 华尔街见闻 7x24 live feed: channel=global (全球), us-stock, forex, crypto, commodities
chinese_sources:
  max_items_per_source: 20
  request_delay_seconds: 0.5  # was 2.0 — Sina + WallstreetCN are lightweight JSON, no rate limits
  sina_channels:
    - {name: "7x24综合快讯", lid: 2509, category: "macro"}
    - {name: "国际新闻", lid: 2511, category: "geopolitics"}
    - {name: "国际/地缘", lid: 2514, category: "geopolitics"}
    - {name: "科技", lid: 2518, category: "tech"}
  wallstreetcn_channels:
    - {channel: "global", name: "全球快讯"}
    - {channel: "us-stock", name: "美股"}
    - {channel: "forex", name: "外汇"}
    - {channel: "crypto", name: "加密货币"}
    - {channel: "commodities", name: "大宗商品"}
