# Global settings for news monitor
frequencies:
  heartbeat: 30          # 30-second tier (production-tuned from 60s), seconds
  fast: 300              # 5-minute tier, seconds
  normal: 900            # 15-minute tier, seconds
  slow: 1800             # 30-minute tier, seconds

weekend_multiplier: 3    # multiply frequencies by 3 on weekends/holidays

# Liveness watchdog — resolves "silence ambiguity" (quiet market vs broken pipeline).
# Measures upstream ingestion independently of push output and alerts on anomalies.
watchdog:
  check_interval_seconds: 1800      # how often to run the health check (30 min)
  ingest_floor_per_hour: 3          # below this per hour → suspect (weekday baseline)
  weekend_floor_multiplier: 0.34    # markets closed → lower the floor, avoid false alarms
  consecutive_bad_threshold: 2      # require N bad checks in a row before siren (anti-flap)
  alert_cooldown_seconds: 3600      # min gap between repeat fault alerts (1h)
  heartbeat_hour: 21                # 21 US-Eastern = 09:00 北京, daily silent "still alive"
  startup_grace_seconds: 300        # warmup before first check (empty DB on cold start ≠ stall)

fast_lane:
  multi_source_count: 3        # sources reporting same event
  multi_source_window: 300     # seconds window for "same time"

deep_lane:
  # LLM provider: auto-detected from env vars
  #   DEEPSEEK_API_KEY set -> uses DeepSeek (deepseek-chat)
  #   ANTHROPIC_API_KEY set -> uses Anthropic Claude (claude-fable-5)
  #   Both set -> DeepSeek preferred
  llm_model: "deepseek-chat"  # or "claude-fable-5", "claude-opus-4-8"
  max_tokens: 800

thresholds:
  urgent_priority: 0.7
  important_priority: 0.4

storage:
  sqlite_path: "data/news.db"
  chroma_path: "data/chroma"

logging:
  level: "INFO"
  file: "logs/news_monitor.log"
  max_size_mb: 10
  backup_count: 5

# API keys referenced from env vars, listed here for documentation
api_keys:
  fred: "${FRED_API_KEY}"
  alpha_vantage: "${ALPHA_VANTAGE_API_KEY}"
  anthropic: "${ANTHROPIC_API_KEY}"
  pushover_app: "${PUSHOVER_APP_TOKEN}"
  pushover_user: "${PUSHOVER_USER_KEY}"
  pushover_user_2: "${PUSHOVER_USER_KEY_2}"
  telegram_chat_id_2: "${TELEGRAM_CHAT_ID_2}"
  telegram_chat_id_3: "${TELEGRAM_CHAT_ID_3}"

# Alert dispatch configuration
alerts:
  # Priority score thresholds for alert levels
  critical_priority: 0.9    # score >= this → CRITICAL (overrides strategic rules)
  important_priority: 0.7   # score >= this → IMPORTANT
  # Strategic detector → auto CRITICAL
  strategic_gov_critical: true       # gov_intervention match → auto CRITICAL
  strategic_nvda_critical_conf: 0.85 # nvda_investment/endorsement confidence ≥ this → CRITICAL
  # Pushover
  pushover_enabled: true
  pushover_critical_sound: "siren"
  pushover_critical_retry: 60        # emergency retry interval (seconds)
  pushover_critical_expire: 3600     # emergency give up after (seconds)
  pushover_important_sound: "persistent"
  # Telegram triple-push (CRITICAL)
  telegram_triple_enabled: true
  telegram_triple_interval: 0.5      # seconds between triple-push messages

# Impact-based push decision (replaces score-only classification)
impact_push:
  prescreen_threshold: 0.30  # FastLane min score to trigger ImpactEvaluator
  critical_threshold: 70     # composite (impact*0.7 + conf*0.3) >= this → CRITICAL
  important_threshold: 50    # composite >= this → IMPORTANT
  impact_weight: 0.7         # impact_score weight in composite
  confidence_weight: 0.3     # confidence weight in composite
  max_concurrent_llm: 3      # max simultaneous LLM calls for impact eval

# Web dashboard configuration
web:
  enabled: true         # Set to true or set WEB_PORT env var
  port: 8080
  host: "0.0.0.0"
