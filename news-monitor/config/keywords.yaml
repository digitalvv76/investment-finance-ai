# Tiered key_people — different weights for market relevance.
# Tier 1: Market PRICERS — their words move stock prices (full weight 0.15)
# Tier 2: Market INFLUENCERS — sometimes move markets (reduced weight 0.10)
# Tier 3: Political figures — need market context, rarely move stocks (minimal 0.03)

key_people_tier1:  # Market pricers — +0.15 in PriorityScorer
  - "Jensen Huang"
  - "Jensen Huang"
  - "Lisa Su"
  - "Kevin Warsh"
  - "Jerome Powell"
  # Chinese
  - "黄仁勋"

key_people_tier2:  # Market influencers — +0.10
  - "Elon Musk"
  - "Warren Buffett"
  - "Jamie Dimon"
  - "Janet Yellen"
  - "Gary Gensler"
  # Chinese
  - "雷军"
