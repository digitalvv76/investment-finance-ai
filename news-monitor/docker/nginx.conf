# Nginx reverse proxy for News Monitor Dashboard
# ================================================
# Place on VPS at: /etc/nginx/sites-available/news-monitor
# Then: ln -s /etc/nginx/sites-available/news-monitor /etc/nginx/sites-enabled/
#
# Replace ALL occurrences of YOUR_DOMAIN_HERE with your actual domain.
# After deploying: certbot --nginx -d YOUR_DOMAIN_HERE

# -------------------------------------------------------------------
# HTTP → HTTPS redirect
# -------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN_HERE;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# -------------------------------------------------------------------
# HTTPS server
# -------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN_HERE;

    # ---- SSL (managed by certbot) ----
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN_HERE/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN_HERE/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/YOUR_DOMAIN_HERE/chain.pem;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ---- Security headers ----
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- Proxy to News Monitor app ----
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # Forward real client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support: disable buffering for real-time push
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;   # 24h — SSE connections stay open

        # Connection timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ---- Deny hidden files ----
    location ~ /\. {
        deny all;
    }

    # ---- Rate limiting (optional — uncomment to enable) ----
    # limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    # limit_req zone=auth burst=10 nodelay;
}
