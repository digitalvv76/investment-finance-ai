<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日期和时间</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0c0c1d 0%, #1a1a3e 50%, #0c0c1d 100%);
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: #ffffff;
        }

        /* 星空背景粒子 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            animation-delay: var(--delay);
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }

        .container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 60px 80px;
            text-align: center;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4),
                        0 0 120px rgba(100, 150, 255, 0.15),
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-2px);
        }

        .label {
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 20px;
        }

        .time {
            font-size: 96px;
            font-weight: 200;
            letter-spacing: 4px;
            line-height: 1;
            margin-bottom: 8px;
            background: linear-gradient(180deg, #ffffff 0%, #a0c4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .seconds {
            font-size: 36px;
            font-weight: 300;
            color: rgba(160, 196, 255, 0.7);
            -webkit-text-fill-color: #6ea8fe;
            vertical-align: super;
        }

        .date {
            font-size: 22px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 3px;
            margin-bottom: 6px;
        }

        .weekday {
            font-size: 18px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.45);
            letter-spacing: 6px;
        }

        .divider {
            width: 60px;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
            margin: 20px auto;
            border-radius: 1px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .container {
                padding: 40px 32px;
                border-radius: 20px;
                margin: 20px;
            }
            .time {
                font-size: 56px;
            }
            .seconds {
                font-size: 24px;
            }
            .date {
                font-size: 17px;
            }
            .weekday {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <!-- 星空背景 -->
    <div class="stars" id="stars"></div>

    <!-- 主容器 -->
    <div class="container">
        <div class="label">当前时间</div>
        <div class="time">
            <span id="hours">00</span>:<span id="minutes">00</span><span class="seconds" id="seconds">:00</span>
        </div>
        <div class="divider"></div>
        <div class="date" id="date">----年--月--日</div>
        <div class="weekday" id="weekday">星期-</div>
    </div>

    <script>
        // 生成星空背景
        function createStars() {
            const container = document.getElementById('stars');
            const fragment = document.createDocumentFragment();
            for (let i = 0; i < 120; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                const size = Math.random() * 2.5 + 0.5;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.setProperty('--delay', (Math.random() * 5) + 's');
                fragment.appendChild(star);
            }
            container.appendChild(fragment);
        }

        // 格式化数字补零
        function pad(n) {
            return n.toString().padStart(2, '0');
        }

        // 更新日期和时间
        function updateClock() {
            const now = new Date();

            // 时间
            document.getElementById('hours').textContent = pad(now.getHours());
            document.getElementById('minutes').textContent = pad(now.getMinutes());
            document.getElementById('seconds').textContent = ':' + pad(now.getSeconds());

            // 日期
            const y = now.getFullYear();
            const m = pad(now.getMonth() + 1);
            const d = pad(now.getDate());
            document.getElementById('date').textContent = `${y}年${m}月${d}日`;

            // 星期
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            document.getElementById('weekday').textContent = `星期${weekdays[now.getDay()]}`;
        }

        // 初始化
        createStars();
        updateClock();
        setInterval(updateClock, 1000);
    </script>

</body>
</html>
